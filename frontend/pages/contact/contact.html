	<header>
		<a class="logo" href="../../index.html">AntiSéd 2028</a>
		<nav>
			<ul>
				<li><a href="../../index.html">Accueil</a></li>

				<li><a href="../team/team.html">Équipe</a></li>

				<li>
					<a href="../espace_sponsor/data/data.html">Espace Sponsor ▾</a>
					<div class="dropdown">
						<a href="../espace_sponsor/data/data.html">Données</a>

						<a href="../espace_sponsor/feedback/feedback.html">Feedback</a>
					</div>

					</div>
				</li>
			</ul>
		</nav>
	</header>

	<main>
		<section class="page-hero">
			<h1>Nous Contacter</h1>
			<p>Une question sur le projet ? Écrivez-nous.</p>
		</section>

		<section class="contact-container">
			<form class="contact-form" action="#" method="POST">
				<div class="form-group">
					<label for="nom">Nom complet</label>
					<input type="text" id="nom" name="nom" placeholder="Votre nom" required>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" placeholder="votre@email.com" required>
				</div>
				<div class="form-group">
					<label for="message">Message</label>
					<textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>
				</div>
				<button type="submit" class="btn-cta">Envoyer</button>
			</form>
		</section>
	</main>

	<footer>
		<p>&copy; 2028 - Projet Cycle Ingénieur Polytech Annecy-Chambéry</p>
	</footer>

</body>
